
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Woices Based Social Feedback</title>
    <meta name="description" content="Post a thought or speak on someone else's. One voice at a time." />
    <meta name="author" content="Woices" />
    
    <!-- Content Security Policy for XSS Protection -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.supabase.co https://api.openai.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss: blob:; media-src 'self' blob: https://*.supabase.co; object-src 'none'; frame-ancestors 'self';" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <meta property="og:title" content="Woices Based Social Feedback" />
    <meta property="og:description" content="Post a thought or speak on someone else's. One voice at a time." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://woices.app/src/assets/woices-logo.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@woices_app" />
    <meta name="twitter:image" content="https://woices.app/src/assets/woices-logo.jpg" />
    
    <!-- Immediate redirect and SEO handling for lovable.app -->
    <script>
      (function() {
        if (window.location.hostname.includes('lovable.app')) {
          // Add noindex immediately
          var noindexMeta = document.createElement('meta');
          noindexMeta.name = 'robots';
          noindexMeta.content = 'noindex, nofollow';
          document.head.appendChild(noindexMeta);
          
          // Immediate redirect
          window.location.replace('https://woices.app' + window.location.pathname + window.location.search + window.location.hash);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
