<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Woices — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0a1a;
      color: #e2dce9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #fff; }
    p { font-size: 1rem; line-height: 1.5; opacity: 0.7; margin-bottom: 2rem; }
    button {
      background: #7C3AED;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your connection. Reconnect to the internet and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
